/* ---- persistent storage (Claude window.storage → localStorage fallback) ---- */
const Store={
  async get(key){
    try{ if(typeof window!=='undefined'&&window.storage){const r=await window.storage.get(key,false);return r?JSON.parse(r.value):null;} }catch(e){}
    try{ const v=localStorage.getItem('inics:'+key);return v?JSON.parse(v):null; }catch(e){ return null; }

    const s=JSON.stringify(val);

 {id:'E01',nameVi:'Nguyễn Xuân Hải Quỳnh',nameEn:'NGUYEN XUAN HAI QUYNH',gender:'F',dob:'1995-12-03',cccd:'079195011802',issued:'2023-04-15',issuerVi:'Bộ Công An',issuerEn:'Ministry of Public Security',

const cS=b=>Math.min(b,SETTINGS.capSIHI),cU=b=>Math.min(b,SETTINGS.capUI);
const prog=t=>t<=0?0:t<=1e7?t*.05:t<=3e7?t*.1-5e5:t<=6e7?t*.2-35e5:t<=1e8?t*.3-95e5:t*.35-145e5;

function attStats(e,ym){
  const [y,m]=ym.split('-').map(Number);const dim=new Date(y,m,0).getDate();
  const rec=ATT[e.id+'|'+ym]||{st:{},ot:0};let std=0,unpaid=0,leave=0,hol=0;

  return{dim,std,unpaid,leave,hol,ot:rec.ot||0,factor};

}

  const vw=root.querySelector('#view');if(vw)vw.onclick=()=>{editMode=false;renderEmp();};
  const sv=root.querySelector('#save');if(sv)sv.onclick=()=>{editMode=false;renderEmp();};
  const tc=root.querySelector('#toCon');if(tc)tc.onclick=()=>{conEmp=e.id;conType=e.status==='probation'?'probation':'labor_indef';go('con');};
  root.querySelectorAll('[data-f]').forEach(inp=>inp.onchange=()=>{let v=inp.value;const f=inp.dataset.f;
    if(f==='hrManaged'||f==='si')v=(v==='true');else if(['salary','dependents'].includes(f))v=+v;else if(f==='probPct')v=+v;else if(f==='probEnd'||f==='probStart')v=v||null;
    e[f]=v;if(f==='salaryType')renderEmp();});
  if(!editMode&&root.querySelector('#idDocs'))renderIdDocs(selEmp);
}

/* ---- ID documents (CCCD) attached to personnel card ---- */
let idDocsCache={};
async function loadIdDocs(empId){
  if(idDocsCache[empId])return idDocsCache[empId];
  const v=await Store.get('iddocs:'+empId);idDocsCache[empId]=Array.isArray(v)?v:[];return idDocsCache[empId];
}
async function renderIdDocs(empId){
  const host=document.getElementById('idDocs');if(!host)return;
  const list=await loadIdDocs(empId);
  const cards=await Promise.all(list.map(async d=>{
    const data=await Store.get('idfile:'+d.fid);
    const thumb=(d.mime||'').startsWith('image/')&&data
      ? `<img src="${data}" data-full="${d.fid}" class="idThumb" style="width:100%;height:104px;object-fit:cover;border-radius:8px 8px 0 0;cursor:zoom-in">`
      : `<div style="height:104px;display:flex;align-items:center;justify-content:center;background:#EEF1F0;border-radius:8px 8px 0 0;font-family:Spectral;color:var(--muted)">${(d.mime||'').includes('pdf')?'PDF':'FILE'}</div>`;
    return `<div style="border:1px solid var(--line);border-radius:9px;overflow:hidden;background:#fff">
      ${thumb}
      <div style="padding:8px 10px">
        <div style="font-size:11.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.name}</div>
        <div class="muted" style="font-size:10.5px;margin-bottom:6px">${d.label||'신분증'} · ${(d.size/1024).toFixed(0)} KB</div>
        <div style="display:flex;gap:6px"><button class="btn gho sm idDl" data-fid="${d.fid}" data-name="${d.name}" style="padding:3px 8px;font-size:11px">다운로드</button><button class="btn gho sm idDel" data-fid="${d.fid}" style="padding:3px 8px;font-size:11px;color:var(--red)">삭제</button></div>
      </div></div>`;
  }));
  host.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:10px">
      ${cards.join('')||'<div class="muted" style="font-size:12px;grid-column:1/-1">첨부된 신분증이 없습니다.</div>'}
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <select id="idLabel" style="font-family:Inter;font-size:12px;border:1px solid var(--line);border-radius:7px;padding:7px 9px"><option>CCCD 앞면</option><option>CCCD 뒷면</option><option>여권</option><option>기타</option></select>
      <input type="file" id="idFile" accept="image/*,.pdf" style="font-size:12px">
      <button class="btn pri sm" id="idAdd" disabled>첨부</button>
    </div>
    <p class="note">신분증 이미지·PDF를 첨부하면 storage에 영구 저장됩니다. 이미지를 클릭하면 원본 크기로 열립니다. (개인정보이므로 공용 PC 보관에 유의)</p>`;
  let pick=null;const fEl=host.querySelector('#idFile'),addEl=host.querySelector('#idAdd');
  fEl.onchange=()=>{pick=fEl.files[0]||null;addEl.disabled=!pick;};
  addEl.onclick=()=>{ if(!pick)return; const rd=new FileReader();
    rd.onload=async()=>{ const fid='ID'+Date.now(); 
      try{await Store.set('idfile:'+fid,rd.result);}catch(e){alert('저장 실패 — 파일이 너무 큽니다.');return;}
      const list=await loadIdDocs(empId);
      list.push({fid,name:pick.name,mime:pick.type||'',size:pick.size,label:host.querySelector('#idLabel').value,addedAt:new Date().toISOString()});
      idDocsCache[empId]=list;await Store.set('iddocs:'+empId,list);renderIdDocs(empId);
    }; rd.readAsDataURL(pick); };
  host.querySelectorAll('.idThumb').forEach(img=>img.onclick=async()=>{const data=await Store.get('idfile:'+img.dataset.full);if(data){const w=window.open('','_blank');if(w){w.document.write('<img src="'+data+'" style="max-width:100%">');w.document.close();}}});
  host.querySelectorAll('.idDl').forEach(b=>b.onclick=async()=>{const data=await Store.get('idfile:'+b.dataset.fid);if(!data)return;const a=document.createElement('a');a.href=data;a.download=b.dataset.name||'id';document.body.appendChild(a);a.click();a.remove();});
  host.querySelectorAll('.idDel').forEach(b=>b.onclick=async()=>{ if(!confirm('이 신분증 파일을 삭제할까요?'))return;
    try{await Store.del('idfile:'+b.dataset.fid);}catch(e){}
    const list=(await loadIdDocs(empId)).filter(d=>d.fid!==b.dataset.fid);
    idDocsCache[empId]=list;await Store.set('iddocs:'+empId,list);renderIdDocs(empId);
  });
}

          <td class="l">${r.source==='uploaded'?'<span class="tag gross" style="font-size:10px">업로드</span>':'<span class="tag net" style="font-size:10px">생성</span>'}<br><span class="muted" style="font-size:10.5px">${(typeLabel[r.type]||r.type||'').split(' ')[0]}</span></td>
          <td class="l mono" style="font-size:11px">${r.createdAt.slice(0,10)}</td>
          <td class="l"><button class="btn gho sm del" data-id="${r.id}" style="color:var(--red)">삭제</button></td>
        </tr>`).join('')}</tbody></table>
      </div>
      <p class="note">행 클릭 → 오른쪽에 표시. <b>생성</b>본은 인적사항 스냅샷으로 보존되고, <b>업로드</b>본은 원본 파일 그대로 보관됩니다. (storage 영구 저장)</p>
    </div>
    <div id="docWrap">${!rec?`<div class="panel"><div class="empty">왼쪽에서 계약서를 선택하세요.</div></div>`
      :isUp?`
      <div class="toolbar" style="justify-content:space-between">
        <div><b class="mono">${rec.docNo}</b> · <span class="muted">${rec.empName} · ${typeLabel[rec.type]||rec.type}</span></div>
        <button class="btn pri sm" id="dlu">원본 다운로드</button>
      </div>
      <div class="panel" style="margin-bottom:14px"><div style="padding:14px 18px;font-size:13px">
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px"><span class="tag gross">업로드본</span><b>${rec.fileName}</b></div>
        <span class="muted" style="font-size:12px">${(rec.size/1048576).toFixed(2)} MB · ${rec.mime||'파일'}${rec.memo?' · '+rec.memo:''}</span>
      </div></div>
      <div id="upPreview"><div class="empty muted">미리보기 불러오는 중…</div></div>`
      :`
      <div class="toolbar" style="justify-content:space-between">
        <div><b class="mono">${rec.docNo}</b> · <span class="muted">${rec.empName} · ${typeLabel[rec.type]||rec.type}</span></div>
        <div style="display:flex;gap:8px"><button class="btn sm" id="prn">인쇄 / PDF</button><button class="btn pri sm" id="dl">Word(.doc) 다운로드</button></div>
      </div>
      ${buildDoc(rec.snapshot,rec.type,rec.docNo)}`}</div>
  </div>`;
  body.querySelectorAll('tr.row').forEach(r=>r.onclick=ev=>{if(ev.target.closest('.del'))return;viewRecId=r.dataset.id;renderReg();});
  body.querySelectorAll('.del').forEach(b=>b.onclick=ev=>{ev.stopPropagation();if(confirm('이 계약서를 삭제할까요?'))delContract(b.dataset.id);});
  const prn=body.querySelector('#prn');if(prn)prn.onclick=()=>printRec(viewRecId);
  const dl=body.querySelector('#dl');if(dl)dl.onclick=()=>downloadRec(viewRecId);
  const dlu=body.querySelector('#dlu');if(dlu)dlu.onclick=()=>downloadUploaded(viewRecId);
  if(isUp)viewUploaded(viewRecId);
}

function buildDoc(e,type,docNo){
  const asof=asofEl.value;const c=calcRow(e,asof);
  const fill=(val)=>val?`<span class="f">${val}</span>`:`<span class="blank">미입력</span>`;
  const DN=docNo||'0X-2026/HĐTV';
  const mr=e.gender==='F'?['Bà','Ms.']:['Ông','Mr.'];
  const gender=e.gender==='F'?['Nữ','Female']:['Nam','Male'];
  const probSal=Math.round(e.salary*e.probPct);
  // bilingual line: Vietnamese on top, English (italic, muted) beneath
  const L=(vi,en)=>`<p>${vi}<span class="en">${en}</span></p>`;
  if(type!=='probation'){
    const indef=type==='labor_indef';
    const noticeVi=indef?'ít nhất 45 ngày (Điều 35)':'ít nhất 30 ngày (Điều 35)';
    const noticeEn=indef?'at least 45 days (Article 35)':'at least 30 days (Article 35)';
    const flag=e.status==='probation'?`<div class="flag"><span>⚠️</span><div><b>상태 불일치</b> — 현재 <b>수습</b> 상태입니다. 정식 계약은 통과(active) 후 체결하세요.</div></div>`:'';
    return `<div class="doc">
      <div class="ctr"><div class="nat">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div><div class="moto">Độc lập - Tự do - Hạnh phúc</div></div>
      <h2 class="title">HỢP ĐỒNG LAO ĐỘNG</h2><div class="titleen">LABOR CONTRACT — ${indef?'không xác định thời hạn / indefinite term':'xác định thời hạn / fixed-term'}</div>
      <p style="text-align:right;font-size:11px" class="muted">Số/No: ${fill(DN)} · TP. Hồ Chí Minh, ${fill('ngày '+vnDate(e.joinDate))}</p>
      ${L(`<b>Bên A:</b> ${COMPANY.name} — MST ${COMPANY.mst} — Đại diện: ${fill(COMPANY.rep)} (Tổng giám đốc)`,`Employer: INICS VINA COMPANY LIMITED — Tax code ${COMPANY.mst} — Represented by ${e.nameEn?COMPANY.rep:COMPANY.rep} (General Director)`)}
      ${L(`<b>Bên B (${mr[0]}):</b> ${fill(e.nameVi)} — Sinh ${fill(vnDate(e.dob))} — Giới tính: ${fill(gender[0])} — CCCD: ${fill(e.cccd)}`,`Employee (${mr[1]}): ${fill(e.nameEn)} — Date of birth ${fill(vnDate(e.dob))} — Gender: ${fill(gender[1])} — ID No.: ${fill(e.cccd)}`)}
      ${L(`Địa chỉ thường trú: ${fill(e.addrVi)}`,`Permanent address: ${fill(e.addrEn)}`)}
      <p class="art">Điều 1. Công việc <span class="en">Article 1. Work</span></p>
      ${L(`Chức vụ: ${fill(e.positionVi)}. Mô tả: ${fill(e.jobDescVi)}`,`Position: ${fill(e.positionEn)}. Description: ${fill(e.jobDescEn)}`)}
      <p class="art">Điều 2. Loại hợp đồng <span class="en">Article 2. Type of contract</span></p>
      ${L(`${fill(indef?'Không xác định thời hạn':'Xác định thời hạn 12 tháng')}. Hiệu lực từ ${fill(vnDate(e.joinDate))}.`,`${indef?'Indefinite term':'Fixed term, 12 months'}. Effective from ${fill(vnDate(e.joinDate))}.`)}
      <p class="art">Điều 3. Mức lương <span class="en">Article 3. Salary</span></p>
      ${e.salaryType==='NET'
        ?L(`Lương NET — thực nhận ${fill(fmt(c.net))} đồng/tháng (Gross ${fmt(e.salary)}).`,`NET salary — take-home ${fill(fmt(c.net))} VND/month (Gross ${fmt(e.salary)}).`)
        :L(`Lương cơ bản (Gross): ${fill(fmt(e.salary))} đồng/tháng.`,`Basic salary (Gross): ${fill(fmt(e.salary))} VND/month.`)}
      <p class="art">Điều 6. Bảo hiểm <span class="en">Article 6. Insurance</span></p>
      ${L(`Tham gia BHXH, BHYT, BHTN bắt buộc ${fill('kể từ ngày hiệu lực')} theo quy định.`,`Compulsory social, health and unemployment insurance ${fill('from the effective date')} as prescribed.`)}
      <p class="art">Điều 8. Nghĩa vụ của người lao động <span class="en">Article 8. Employee obligations</span></p>
      ${L(`Đơn phương chấm dứt phải báo trước ${fill(noticeVi)}; vi phạm bồi thường theo Điều 40. Vi phạm nghĩa vụ bàn giao bị xử lý kỷ luật theo Nội quy lao động.`,`Unilateral termination requires ${fill(noticeEn)} notice; violation entails compensation under Article 40. Breach of handover duty is subject to discipline under the Internal Labor Rules.`)}
      <div class="sig"><div><b>NGƯỜI LAO ĐỘNG</b><span class="en">Employee</span><div class="nm">${e.nameVi||'________'}</div></div><div><b>NGƯỜI SỬ DỤNG LAO ĐỘNG</b><span class="en">Employer</span><div class="nm">${COMPANY.rep}</div></div></div>
      ${flag}
    </div>
    <div class="legend"><span><span class="sw" style="background:#E7F1EF;border:1px solid #9FC9C0"></span>자동 채움</span><span><span class="sw" style="background:#FBF4E6;border:1px solid #D9A93C"></span>미입력</span></div>
    <p class="note">무기한·확정기간은 별도 템플릿(보험 1일차·45/30일 통보·제40조)을 적용합니다.</p>`;
  }
  return `<div class="doc">
    <div class="ctr"><div class="nat">CỘNG HÒA XÃ HỘI CHỦ NGHĨA VIỆT NAM</div><div class="moto">Độc lập - Tự do - Hạnh phúc</div></div>
    <p style="text-align:right;font-size:11px" class="muted">Số/No: ${fill(DN)} · TP. Hồ Chí Minh, ${fill('ngày '+vnDate(e.probStart))}</p>
    <h2 class="title">HỢP ĐỒNG THỬ VIỆC</h2><div class="titleen">PROBATION CONTRACT</div>
    ${L(`<b>Chúng tôi, một bên là:</b> ${COMPANY.name}`,`We are, from one side: INICS VINA COMPANY LIMITED`)}
    ${L(`Địa chỉ: ${COMPANY.addrVi} · MST: ${COMPANY.mst}`,`Address: No. 28 Dang Huu Pho Street, An Khanh Ward, Ho Chi Minh City · Tax code: ${COMPANY.mst}`)}
    ${L(`Đại diện theo pháp luật: ${fill(COMPANY.rep)} — Tổng giám đốc`,`Legal Representative: ${fill(COMPANY.rep)} — General Director`)}
    ${L(`<b>Và một bên là ${fill(mr[0])}:</b> ${fill(e.nameVi)}`,`<b>And from the other side is ${fill(mr[1])}:</b> ${fill(e.nameEn)}`)}
    ${L(`Quốc tịch: Việt Nam · Giới tính: ${fill(gender[0])} · Sinh ngày: ${fill(vnDate(e.dob))}`,`Nationality: Vietnam · Gender: ${fill(gender[1])} · Date of birth: ${fill(vnDate(e.dob))}`)}
    ${L(`CCCD: ${fill(e.cccd)} — cấp ngày ${fill(vnDate(e.issued))} bởi ${fill(e.issuerVi)}`,`ID/Passport No.: ${fill(e.cccd)} — issued ${fill(vnDate(e.issued))} by ${fill(e.issuerEn)}`)}
    ${L(`Địa chỉ thường trú: ${fill(e.addrVi)}`,`Permanent address: ${fill(e.addrEn)}`)}
    <p class="art">Điều 1. Công việc và địa điểm làm việc <span class="en">Article 1. Work description and work place</span></p>
    ${L(`- Chức vụ: ${fill(e.positionVi)}`,`- Position: ${fill(e.positionEn)}`)}
    ${L(`- Mô tả công việc: ${fill(e.jobDescVi)}`,`- Work description: ${fill(e.jobDescEn)}`)}
    ${L(`- Địa điểm làm việc: ${COMPANY.addrVi}`,`- Work place: No. 28 Dang Huu Pho Street, An Khanh Ward, Ho Chi Minh City`)}
    <p class="art">Điều 2. Thời gian thử việc <span class="en">Article 2. Probation period</span></p>
    ${L(`Thời gian thử việc 02 tháng (60 ngày), từ ${fill(vnDate(e.probStart))} đến ${fill(vnDate(e.probEnd))}. Thông báo kết quả chậm nhất 03 ngày trước khi kết thúc.`,`Probation period of 02 months (60 days), from ${fill(vnDate(e.probStart))} to ${fill(vnDate(e.probEnd))}. The result is notified at least 03 days before the end.`)}
    <p class="art">Điều 3. Mức lương <span class="en">Article 3. Salary</span></p>
    ${L(`- Lương chính thức (Gross): ${fill(fmt(e.salary))} đồng/tháng.`,`- Official salary (Gross): ${fill(fmt(e.salary))} VND/month.`)}
    ${L(`- Trong thời gian thử việc hưởng ${fill(Math.round(e.probPct*100)+'%')} = ${fill(fmt(probSal))} đồng/tháng. Thuế TNCN khấu trừ theo quy định.`,`- During probation, ${fill(Math.round(e.probPct*100)+'%')} = ${fill(fmt(probSal))} VND/month. Personal income tax withheld as prescribed.`)}
    ${L(`- Trả lương ngày 10 hàng tháng, tiền mặt hoặc chuyển khoản.`,`- Paid on the 10th of each month, by cash or bank transfer.`)}
    <p class="art">Điều 4. Thời giờ làm việc, nghỉ ngơi <span class="en">Article 4. Working time, rest time</span></p>
    ${L(`Thứ Hai–Thứ Sáu, 08:30–12:00 và 13:00–17:30. Làm thêm không quá 40 giờ/tháng, 200 giờ/năm. Nghỉ Thứ Bảy, Chủ nhật.`,`Monday–Friday, 08:30–12:00 and 13:00–17:30. Overtime not exceeding 40 hours/month, 200 hours/year. Days off: Saturday, Sunday.`)}
    <p class="art">Điều 5. Trang bị bảo hộ cho người lao động <span class="en">Article 5. Personal protective equipment</span></p>
    ${L(`Trang bị đồng phục và đồ dùng bảo hộ lao động phù hợp với tính chất công việc.`,`Uniform and work accessories appropriate to the nature of the work.`)}
    <p class="art">Điều 6. Bảo hiểm xã hội, y tế, thất nghiệp <span class="en">Article 6. Social, health, unemployment insurance</span></p>
    ${L(`Trong thời gian thử việc theo hợp đồng này, hai bên không tham gia bảo hiểm bắt buộc. Bảo hiểm xã hội, bảo hiểm y tế và bảo hiểm thất nghiệp sẽ được đăng ký và đóng theo quy định kể từ khi hai bên giao kết hợp đồng lao động chính thức sau khi đạt yêu cầu thử việc.`,`During the probation period under this contract, the parties do not participate in compulsory insurance. Social, health and unemployment insurance shall be registered and contributed as prescribed from the time the parties sign the official labor contract after passing probation.`)}
    <p class="art">Điều 7. Đào tạo, bồi dưỡng nâng cao kỹ năng nghề <span class="en">Article 7. Training and refresher courses</span></p>
    ${L(`Theo thỏa thuận riêng giữa người lao động và Công ty.`,`In accordance with a separate agreement between the employee and the Company.`)}
    <p class="art">Điều 8. Nghĩa vụ của người lao động <span class="en">Article 8. Obligations of the employee</span></p>
    ${L(`- Hoàn thành công việc đã cam kết trong hợp đồng.`,`- To fulfill the work undertaken in the contract.`)}
    ${L(`- Chấp hành lệnh điều hành sản xuất – kinh doanh, nội quy kỷ luật lao động và an toàn lao động.`,`- To comply with production and business orders, internal labor discipline and occupational safety.`)}
    ${L(`- Bồi thường do vi phạm và trách nhiệm vật chất theo Nội quy lao động.`,`- To compensate for violations and material liability per the Internal Labor Rules.`)}
    ${L(`- Có trách nhiệm bàn giao công việc, tài liệu và tài sản khi chấm dứt hợp đồng. Vi phạm nghĩa vụ bàn giao bị xử lý kỷ luật theo Nội quy lao động.`,`- Responsible for handing over work, documents and assets upon termination. Breach of the handover obligation is subject to discipline under the Internal Labor Rules.`)}
    ${L(`- Trong thời gian thử việc, mỗi bên có quyền hủy bỏ hợp đồng thử việc mà không cần báo trước và không phải bồi thường (khoản 2 Điều 27 Bộ luật Lao động).`,`- During probation, each party may cancel the probation contract without prior notice and without compensation (Clause 2, Article 27, Labor Code).`)}
    <p class="art">Điều 9. Nghĩa vụ và quyền hạn của người sử dụng lao động <span class="en">Article 9. Obligations and rights of the employer</span></p>
    ${L(`1. Nghĩa vụ: Bảo đảm việc làm và thực hiện đầy đủ những điều đã cam kết; thanh toán đầy đủ, đúng hạn các chế độ và quyền lợi cho người lao động.`,`1. Obligations: Ensure employment and fully implement all commitments; pay fully and on time all benefits and entitlements.`)}
    ${L(`2. Quyền hạn: Điều hành người lao động hoàn thành công việc (bố trí, điều chuyển, tạm ngừng việc…); tạm hoãn, chấm dứt hợp đồng, kỷ luật theo pháp luật và Nội quy lao động.`,`2. Rights: Manage the employee to fulfill the work (assign, transfer, suspend…); postpone, terminate the contract and discipline per law and the Internal Labor Rules.`)}
    <p class="art">Điều 10. Các nội dung khác <span class="en">Article 10. Other contents</span></p>
    ${L(`Chế độ phúc lợi khác — Tiền thưởng: theo quy chế thưởng của Công ty.`,`Other benefits — Bonus: in accordance with the Company's bonus regulations.`)}
    <p class="art">Điều 11. Điều khoản thi hành <span class="en">Article 11. Implementation provisions</span></p>
    ${L(`Những vấn đề lao động không ghi trong hợp đồng áp dụng thỏa ước lao động tập thể; nếu chưa có thì áp dụng pháp luật lao động. Hợp đồng lập thành 02 bản giá trị ngang nhau, mỗi bên giữ 01 bản, hiệu lực từ ${fill(vnDate(e.probStart))}.`,`Labor matters not stated herein follow the collective labor agreement; absent one, labor law applies. Made in 02 copies of equal validity, each party keeps 01, effective from ${fill(vnDate(e.probStart))}.`)}
    <div class="sig">
      <div><b>NGƯỜI LAO ĐỘNG</b><span class="en">Employee</span><div class="nm">${e.nameVi||'________'}</div></div>
      <div><b>NGƯỜI SỬ DỤNG LAO ĐỘNG</b><span class="en">Employer</span><div class="nm">${COMPANY.rep}</div></div>
    </div>
  </div>
  <div class="legend"><span><span class="sw" style="background:#E7F1EF;border:1px solid #9FC9C0"></span>인적사항에서 자동 채움</span><span><span class="sw" style="background:#FBF4E6;border:1px solid #D9A93C"></span>미입력 — 카드에서 보완</span></div>
  <p class="note">초록 음영 = 직원 인적사항 카드에서 끌어온 값. 베트남어 위, 영문 아래 병기. 실제 .docx 발행은 동일 템플릿으로 생성합니다.</p>`;
}
render();
Store.get('contracts').then(v=>{contractsCache=Array.isArray(v)?v:[];if(cur==='con')renderCon();});
</script>
